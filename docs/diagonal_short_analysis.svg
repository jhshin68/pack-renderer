<svg width="700" height="580" viewBox="0 0 700 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="580" fill="#1a1e2e"/>
  <text x="350" y="30" fill="#ffffff" font-size="15" font-weight="bold" text-anchor="middle">대각선 니켈 — 쇼트 발생 메커니즘 분석</text>

  <!-- ══════ 케이스 1: 2S3P 단순 케이스 ══════ -->
  <text x="130" y="58" fill="#aaaaaa" font-size="12" text-anchor="middle">① 2S3P — 전류 불균형</text>

  <!-- 대각선 니켈 (하단 레이어) -->
  <g transform="rotate(-34, 130, 170)">
    <rect x="90" y="80" width="40" height="175" fill="#888" stroke="#555" stroke-width="1" opacity="0.85"/>
  </g>

  <!-- G1 셀 3개 (cx=80) -->
  <circle cx="80" cy="100" r="28" fill="#fff" stroke="#C0392B" stroke-width="3"/>
  <circle cx="80" cy="100" r="10" fill="#C0392B"/>
  <text x="80" y="104" fill="#fff" font-size="9" text-anchor="middle" font-weight="bold">C1+</text>

  <circle cx="80" cy="168" r="28" fill="#fff" stroke="#C0392B" stroke-width="3"/>
  <circle cx="80" cy="168" r="10" fill="#C0392B"/>
  <text x="80" y="172" fill="#fff" font-size="9" text-anchor="middle" font-weight="bold">C2+</text>

  <circle cx="80" cy="236" r="28" fill="#fff" stroke="#C0392B" stroke-width="2.5" stroke-dasharray="5 3"/>
  <circle cx="80" cy="236" r="10" fill="#C0392B" opacity="0.4"/>
  <text x="80" y="240" fill="#C0392B" font-size="9" text-anchor="middle" font-weight="bold">C3+</text>
  <text x="80" y="272" fill="#E74C3C" font-size="10" text-anchor="middle">미접촉!</text>

  <!-- G2 셀 3개 (cx=180) -->
  <circle cx="180" cy="100" r="28" fill="none" stroke="#555" stroke-width="2.5" stroke-dasharray="5 3"/>
  <circle cx="180" cy="100" r="8"  fill="#555" opacity="0.4"/>
  <text x="180" y="104" fill="#888" font-size="9" text-anchor="middle" font-weight="bold">C4−</text>
  <text x="180" y="136" fill="#E74C3C" font-size="10" text-anchor="middle">미접촉!</text>

  <circle cx="180" cy="168" r="28" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="180" cy="168" r="8"  fill="#333"/>
  <text x="180" y="172" fill="#fff" font-size="9" text-anchor="middle" font-weight="bold">C5−</text>

  <circle cx="180" cy="236" r="28" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="180" cy="236" r="8"  fill="#333"/>
  <text x="180" y="240" fill="#fff" font-size="9" text-anchor="middle" font-weight="bold">C6−</text>

  <!-- 문제 설명 박스 -->
  <rect x="30" y="290" width="220" height="80" rx="5" fill="#2c0a0a" stroke="#E74C3C" stroke-width="1"/>
  <text x="40" y="308" fill="#E74C3C" font-size="11" font-weight="bold">문제 ①: 전류 불균형</text>
  <text x="40" y="325" fill="#ffffff" font-size="10">C3, C4는 니켈 미접촉</text>
  <text x="40" y="340" fill="#ffffff" font-size="10">→ C1,C2만 전류 과부하</text>
  <text x="40" y="355" fill="#F39C12" font-size="10">→ 과열 → 열폭주(Thermal Runaway)</text>

  <!-- ══════ 케이스 2: 다수 그룹 쇼트 ══════ -->
  <text x="430" y="58" fill="#aaaaaa" font-size="12" text-anchor="middle">② 3개 이상 그룹 — 직접 단락</text>

  <!-- G1 셀 (cx=310) -->
  <circle cx="310" cy="100" r="26" fill="#fff" stroke="#C0392B" stroke-width="2.5"/>
  <circle cx="310" cy="100" r="9"  fill="#C0392B"/>
  <circle cx="310" cy="168" r="26" fill="#fff" stroke="#C0392B" stroke-width="2.5"/>
  <circle cx="310" cy="168" r="9"  fill="#C0392B"/>
  <circle cx="310" cy="236" r="26" fill="#fff" stroke="#C0392B" stroke-width="2.5"/>
  <circle cx="310" cy="236" r="9"  fill="#C0392B"/>
  <text x="310" y="272" fill="#E07B26" font-size="11" font-weight="bold" text-anchor="middle">G1(+)</text>

  <!-- G2 셀 (cx=400) -->
  <circle cx="400" cy="100" r="26" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="400" cy="100" r="8"  fill="#333"/>
  <circle cx="400" cy="168" r="26" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="400" cy="168" r="8"  fill="#333"/>
  <circle cx="400" cy="236" r="26" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="400" cy="236" r="8"  fill="#333"/>
  <text x="400" y="272" fill="#1A75C0" font-size="11" font-weight="bold" text-anchor="middle">G2(−/+)</text>

  <!-- G3 셀 (cx=490) -->
  <circle cx="490" cy="100" r="26" fill="#fff" stroke="#C0392B" stroke-width="2.5"/>
  <circle cx="490" cy="100" r="9"  fill="#C0392B"/>
  <circle cx="490" cy="168" r="26" fill="#fff" stroke="#C0392B" stroke-width="2.5"/>
  <circle cx="490" cy="168" r="9"  fill="#C0392B"/>
  <circle cx="490" cy="236" r="26" fill="#fff" stroke="#C0392B" stroke-width="2.5"/>
  <circle cx="490" cy="236" r="9"  fill="#C0392B"/>
  <text x="490" y="272" fill="#E07B26" font-size="11" font-weight="bold" text-anchor="middle">G3(+)</text>

  <!-- 대각선 니켈 (G1~G3 가로지름) -->
  <g transform="rotate(-30, 400, 168)">
    <rect x="290" y="148" width="220" height="40" fill="#888" stroke="#555" stroke-width="1" opacity="0.85"/>
  </g>

  <!-- 쇼트 화살표 -->
  <line x1="310" y1="168" x2="490" y2="168" stroke="#E74C3C" stroke-width="3" stroke-dasharray="6 3" marker-end="url(#arrowR)"/>
  <rect x="360" y="148" width="80" height="22" rx="3" fill="#E74C3c" opacity="0.15"/>
  <text x="400" y="163" fill="#E74C3C" font-size="12" font-weight="bold" text-anchor="middle">직접 쇼트!</text>

  <!-- G2 바이패스 표시 -->
  <text x="400" y="295" fill="#E74C3C" font-size="10" text-anchor="middle">G2를 건너뛰어 G1(+)↔G3(+) 직접 연결</text>
  <text x="400" y="310" fill="#E74C3C" font-size="10" text-anchor="middle">→ G2 셀 양단 단락 → 순간 대전류</text>

  <!-- ══════ 하단: 원칙 ══════ -->
  <line x1="20" y1="380" x2="680" y2="380" stroke="#444" stroke-width="1" stroke-dasharray="5 4"/>

  <text x="350" y="405" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">신규 원칙 — 니켈 배치 방향 절대 규칙</text>

  <!-- 금지 박스 -->
  <rect x="30"  y="418" width="300" height="140" rx="6" fill="#2c0a0a" stroke="#E74C3C" stroke-width="2"/>
  <text x="180" y="440" fill="#E74C3C" font-size="13" font-weight="bold" text-anchor="middle">🚫 절대 금지</text>
  <text x="45"  y="460" fill="#ffffff" font-size="11">대각선(사선) 방향 니켈 배치</text>
  <text x="45"  y="478" fill="#aaaaaa" font-size="10">이유 ①: 그룹 내 일부 셀 미접촉</text>
  <text x="45"  y="494" fill="#aaaaaa" font-size="10">        → 접촉 셀에 전류 집중 → 과열</text>
  <text x="45"  y="510" fill="#aaaaaa" font-size="10">이유 ②: 비인접 그룹 동시 접촉</text>
  <text x="45"  y="526" fill="#aaaaaa" font-size="10">        → G(n)과 G(n+2) 직접 단락</text>
  <text x="45"  y="542" fill="#aaaaaa" font-size="10">이유 ③: 스폿 용접 공정 불가</text>

  <!-- 허용 박스 -->
  <rect x="370" y="418" width="300" height="140" rx="6" fill="#0a2c0a" stroke="#27AE60" stroke-width="2"/>
  <text x="520" y="440" fill="#27AE60" font-size="13" font-weight="bold" text-anchor="middle">✓ 허용 방향</text>
  <text x="385" y="460" fill="#ffffff" font-size="11">수평(가로) 또는 수직(상하) 배치만</text>

  <!-- 수직 OK -->
  <rect x="395" y="473" width="22" height="55" rx="2" fill="#888"/>
  <text x="406" y="542" fill="#27AE60" font-size="10" text-anchor="middle">수직 ✓</text>

  <!-- 수평 OK -->
  <rect x="460" y="493" width="55" height="22" rx="2" fill="#888"/>
  <text x="487" y="542" fill="#27AE60" font-size="10" text-anchor="middle">수평 ✓</text>

  <!-- 대각선 NO -->
  <g transform="rotate(-35, 580, 505)">
    <rect x="558" y="478" width="22" height="55" rx="2" fill="#888" opacity="0.4"/>
  </g>
  <line x1="556" y1="478" x2="604" y2="532" stroke="#E74C3C" stroke-width="3"/>
  <line x1="604" y1="478" x2="556" y2="532" stroke="#E74C3C" stroke-width="3"/>
  <text x="580" y="548" fill="#E74C3C" font-size="10" text-anchor="middle">대각선 ✗</text>

  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E74C3C"/>
    </marker>
  </defs>

</svg>
