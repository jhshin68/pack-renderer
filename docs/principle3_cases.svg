<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <rect width="680" height="520" fill="#1a1e2e"/>
  <text x="340" y="30" fill="#ffffff" font-size="15" font-weight="bold" text-anchor="middle">니켈 연결 방향 3가지 경우</text>

  <!-- ══════════════════════════════════════════════
       CASE 1: 가로 연결 (좌우)
  ══════════════════════════════════════════════ -->
  <text x="100" y="60" fill="#27AE60" font-size="13" font-weight="bold" text-anchor="middle">① 가로 연결 (G1→G2 좌우)</text>

  <!-- 니켈 -->
  <rect x="30"  y="80"  width="28" height="90" fill="#888" stroke="#555" stroke-width="1"/>
  <rect x="142" y="80"  width="28" height="90" fill="#888" stroke="#555" stroke-width="1"/>
  <rect x="30"  y="72"  width="140" height="28" fill="#888" stroke="#555" stroke-width="1"/>
  <rect x="30"  y="142" width="140" height="28" fill="#888" stroke="#555" stroke-width="1"/>

  <!-- G1 셀 2개 (cx=44) -->
  <circle cx="44" cy="86"  r="22" fill="#fff" stroke="#C0392B" stroke-width="2.5"/>
  <circle cx="44" cy="86"  r="8"  fill="#C0392B"/>
  <circle cx="44" cy="158" r="22" fill="#fff" stroke="#C0392B" stroke-width="2.5"/>
  <circle cx="44" cy="158" r="8"  fill="#C0392B"/>

  <!-- G2 셀 2개 (cx=156) -->
  <circle cx="156" cy="86"  r="22" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="156" cy="86"  r="7"  fill="#333"/>
  <circle cx="156" cy="158" r="22" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="156" cy="158" r="7"  fill="#333"/>

  <text x="44"  y="198" fill="#E07B26" font-size="11" text-anchor="middle">G1</text>
  <text x="156" y="198" fill="#1A75C0" font-size="11" text-anchor="middle">G2</text>

  <!-- 가로 연결 화살표 -->
  <line x1="58" y1="122" x2="130" y2="122" stroke="#27AE60" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <text x="100" y="220" fill="#27AE60" font-size="11" text-anchor="middle">원칙 3 적용</text>
  <text x="100" y="235" fill="#aaaaaa" font-size="10" text-anchor="middle">ㄷ자 가로 폭 공식</text>

  <!-- ══════════════════════════════════════════════
       CASE 2: 상하 연결
  ══════════════════════════════════════════════ -->
  <text x="340" y="60" fill="#F39C12" font-size="13" font-weight="bold" text-anchor="middle">② 상하 연결 (G1→G2 위아래)</text>

  <!-- 니켈 (90도 회전 ㄷ자) -->
  <rect x="258" y="80"  width="140" height="28" fill="#888" stroke="#555" stroke-width="1"/>
  <rect x="258" y="152" width="140" height="28" fill="#888" stroke="#555" stroke-width="1"/>
  <rect x="258" y="80"  width="28"  height="100" fill="#888" stroke="#555" stroke-width="1"/>
  <rect x="370" y="80"  width="28"  height="100" fill="#888" stroke="#555" stroke-width="1"/>

  <!-- G1 셀 2개 (cy=94) — 위 행 -->
  <circle cx="278" cy="94"  r="22" fill="#fff" stroke="#C0392B" stroke-width="2.5"/>
  <circle cx="278" cy="94"  r="8"  fill="#C0392B"/>
  <circle cx="370" cy="94"  r="22" fill="#fff" stroke="#C0392B" stroke-width="2.5"/>
  <circle cx="370" cy="94"  r="8"  fill="#C0392B"/>

  <!-- G2 셀 2개 (cy=166) — 아래 행 -->
  <circle cx="278" cy="166" r="22" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="278" cy="166" r="7"  fill="#333"/>
  <circle cx="370" cy="166" r="22" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="370" cy="166" r="7"  fill="#333"/>

  <text x="324" y="78"  fill="#E07B26" font-size="11" text-anchor="middle">G1</text>
  <text x="324" y="200" fill="#1A75C0" font-size="11" text-anchor="middle">G2</text>

  <!-- 상하 연결 화살표 -->
  <line x1="324" y1="110" x2="324" y2="148" stroke="#F39C12" stroke-width="2.5" marker-end="url(#arrowO)"/>

  <text x="324" y="220" fill="#F39C12" font-size="11" text-anchor="middle">원칙 3 미정의!</text>
  <text x="324" y="235" fill="#aaaaaa" font-size="10" text-anchor="middle">세로 폭 공식이 없다</text>

  <!-- ══════════════════════════════════════════════
       CASE 3: 대각선 연결
  ══════════════════════════════════════════════ -->
  <text x="560" y="60" fill="#E74C3C" font-size="13" font-weight="bold" text-anchor="middle">③ 대각선 연결</text>

  <!-- G1 셀 (좌상) -->
  <circle cx="490" cy="100" r="22" fill="#fff" stroke="#C0392B" stroke-width="2.5" opacity="0.5"/>
  <circle cx="490" cy="100" r="8"  fill="#C0392B" opacity="0.5"/>
  <!-- G2 셀 (우하) -->
  <circle cx="610" cy="180" r="22" fill="none" stroke="#333" stroke-width="2.5" opacity="0.5"/>
  <circle cx="610" cy="180" r="7"  fill="#333" opacity="0.5"/>

  <!-- 대각선 연결 (빨강 X) -->
  <line x1="510" y1="116" x2="590" y2="164" stroke="#E74C3C" stroke-width="3" stroke-dasharray="8 4" opacity="0.7"/>

  <!-- X 표시 -->
  <line x1="530" y1="126" x2="570" y2="154" stroke="#E74C3C" stroke-width="8" opacity="0.3"/>
  <line x1="530" y1="154" x2="570" y2="126" stroke="#E74C3C" stroke-width="8" opacity="0.3"/>
  <text x="550" y="145" fill="#E74C3C" font-size="28" font-weight="bold" text-anchor="middle" opacity="0.9">✕</text>

  <text x="550" y="215" fill="#E74C3C" font-size="13" font-weight="bold" text-anchor="middle">절대 금지</text>
  <text x="550" y="232" fill="#aaaaaa" font-size="10" text-anchor="middle">원칙 12 — 쇼트 위험</text>

  <!-- ══════════════════════════════════════════════
       하단 설명
  ══════════════════════════════════════════════ -->
  <line x1="20" y1="255" x2="660" y2="255" stroke="#444" stroke-width="1" stroke-dasharray="5 4"/>

  <text x="340" y="280" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle">문제: 현재 원칙 3은 ①번(가로)만 정의되어 있다</text>

  <!-- 표 -->
  <rect x="30"  y="295" width="620" height="36" fill="#0d1117" stroke="#444" stroke-width="1" rx="4"/>
  <rect x="30"  y="331" width="620" height="36" fill="#111520" stroke="#444" stroke-width="1"/>
  <rect x="30"  y="367" width="620" height="36" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <rect x="30"  y="403" width="620" height="36" fill="#111520" stroke="#444" stroke-width="1"/>

  <!-- 헤더 -->
  <text x="120" y="318" fill="#aaaaaa" font-size="12" text-anchor="middle">연결 방향</text>
  <text x="310" y="318" fill="#aaaaaa" font-size="12" text-anchor="middle">현재 원칙 3 적용 여부</text>
  <text x="520" y="318" fill="#aaaaaa" font-size="12" text-anchor="middle">필요한 공식</text>

  <!-- 행 1: 가로 -->
  <text x="120" y="355" fill="#27AE60" font-size="12" text-anchor="middle">① 가로 (좌우)</text>
  <text x="310" y="355" fill="#27AE60" font-size="12" text-anchor="middle">✓ 정의됨</text>
  <text x="520" y="355" fill="#27AE60" font-size="11" text-anchor="middle">G_left.cx − nw/2 ~ G_right.cx + nw/2</text>

  <!-- 행 2: 상하 -->
  <text x="120" y="391" fill="#F39C12" font-size="12" text-anchor="middle">② 상하 (위아래)</text>
  <text x="310" y="391" fill="#F39C12" font-size="12" text-anchor="middle">✕ 미정의</text>
  <text x="520" y="391" fill="#F39C12" font-size="11" text-anchor="middle">G_top.cy − nw/2 ~ G_bot.cy + nw/2 ?</text>

  <!-- 행 3: 대각선 -->
  <text x="120" y="427" fill="#E74C3C" font-size="12" text-anchor="middle">③ 대각선</text>
  <text x="310" y="427" fill="#E74C3C" font-size="12" text-anchor="middle">✕ 금지 (원칙 12)</text>
  <text x="520" y="427" fill="#E74C3C" font-size="11" text-anchor="middle">쇼트 위험 — 공식 없음</text>

  <text x="340" y="465" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">→ 원칙 3을 가로/상하 양방향으로 확장이 필요합니다</text>

  <!-- 화살표 마커 -->
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27AE60"/>
    </marker>
    <marker id="arrowO" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F39C12"/>
    </marker>
  </defs>

</svg>
