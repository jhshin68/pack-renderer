<svg width="620" height="420" viewBox="0 0 620 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- 배경 -->
  <rect width="620" height="420" fill="#1a1e2e"/>

  <!-- 제목 -->
  <text x="310" y="32" fill="#ffffff" font-size="15" font-weight="bold" text-anchor="middle">원칙 3 — ㄷ자 니켈 가로 폭</text>

  <!-- ───────────────────────────────────────────── -->
  <!-- 좌표 설정
       G_left  셀들: cx=160, G_right 셀들: cx=320
       pitch = 160, nickel_w = 40
       셀 반지름 R = 36
       3개 셀(P=3): y = 100, 172, 244
  -->

  <!-- ㄷ자 니켈 플레이트 (먼저 그림 — 하단 레이어) -->
  <!-- 좌 세로 스파인: x=140~180, y=100~244 -->
  <rect x="140" y="100" width="40" height="144" fill="#888888" stroke="#555555" stroke-width="1"/>
  <!-- 우 세로 스파인: x=300~340, y=100~244 -->
  <rect x="300" y="100" width="40" height="144" fill="#888888" stroke="#555555" stroke-width="1"/>
  <!-- 상단 가로 브리지: x=140~340, y=82~100 -->
  <rect x="140" y="82"  width="200" height="38"  fill="#888888" stroke="#555555" stroke-width="1"/>
  <!-- 하단 가로 브리지: x=140~340, y=244~262 -->
  <rect x="140" y="244" width="200" height="38"  fill="#888888" stroke="#555555" stroke-width="1"/>
  <!-- 중간 가로 브리지 (p=1): x=140~340, y=163~181 -->
  <rect x="140" y="163" width="200" height="38"  fill="#888888" stroke="#555555" stroke-width="1"/>

  <!-- ───── G_left 셀 3개 (cx=160) ───── -->
  <!-- C1 (+면) -->
  <circle cx="160" cy="100" r="36" fill="#ffffff" stroke="#C0392B" stroke-width="3"/>
  <circle cx="160" cy="100" r="13" fill="#C0392B"/>
  <!-- C2 (+면) -->
  <circle cx="160" cy="172" r="36" fill="#ffffff" stroke="#C0392B" stroke-width="3"/>
  <circle cx="160" cy="172" r="13" fill="#C0392B"/>
  <!-- C3 (+면) -->
  <circle cx="160" cy="244" r="36" fill="#ffffff" stroke="#C0392B" stroke-width="3"/>
  <circle cx="160" cy="244" r="13" fill="#C0392B"/>

  <!-- ───── G_right 셀 3개 (cx=320) ───── -->
  <!-- C4 (-면) -->
  <circle cx="320" cy="100" r="36" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="320" cy="100" r="9"  fill="#1a1a1a"/>
  <!-- C5 (-면) -->
  <circle cx="320" cy="172" r="36" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="320" cy="172" r="9"  fill="#1a1a1a"/>
  <!-- C6 (-면) -->
  <circle cx="320" cy="244" r="36" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="320" cy="244" r="9"  fill="#1a1a1a"/>

  <!-- ───── 그룹 라벨 ───── -->
  <text x="160" y="300" fill="#E07B26" font-size="14" font-weight="bold" text-anchor="middle">G_left (G1)</text>
  <text x="160" y="318" fill="#aaaaaa" font-size="11" text-anchor="middle">C1, C2, C3</text>
  <text x="320" y="300" fill="#1A75C0" font-size="14" font-weight="bold" text-anchor="middle">G_right (G2)</text>
  <text x="320" y="318" fill="#aaaaaa" font-size="11" text-anchor="middle">C4, C5, C6</text>

  <!-- ───── 치수 표기 ───── -->

  <!-- G_left.cx 수직선 -->
  <line x1="160" y1="56" x2="160" y2="74" stroke="#E07B26" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="160" y="52" fill="#E07B26" font-size="11" text-anchor="middle">G_left.cx</text>

  <!-- G_right.cx 수직선 -->
  <line x1="320" y1="56" x2="320" y2="74" stroke="#1A75C0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="320" y="52" fill="#1A75C0" font-size="11" text-anchor="middle">G_right.cx</text>

  <!-- 왼쪽 엣지 표시 (x=140) -->
  <line x1="140" y1="340" x2="140" y2="360" stroke="#27AE60" stroke-width="1.5"/>
  <line x1="340" y1="340" x2="340" y2="360" stroke="#27AE60" stroke-width="1.5"/>
  <line x1="140" y1="350" x2="340" y2="350" stroke="#27AE60" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="240" y="370" fill="#27AE60" font-size="12" font-weight="bold" text-anchor="middle">전체 폭 = pitch + nickel_w</text>
  <text x="240" y="385" fill="#27AE60" font-size="11" text-anchor="middle">= (G_right.cx − G_left.cx) + nickel_w</text>

  <!-- nickel_w/2 좌측 표시 -->
  <line x1="140" y1="330" x2="160" y2="330" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="140" y1="326" x2="140" y2="334" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="160" y1="326" x2="160" y2="334" stroke="#ffffff" stroke-width="1.2"/>
  <text x="150" y="325" fill="#ffffff" font-size="10" text-anchor="middle">nw/2</text>

  <!-- nickel_w/2 우측 표시 -->
  <line x1="320" y1="330" x2="340" y2="330" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="320" y1="326" x2="320" y2="334" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="340" y1="326" x2="340" y2="334" stroke="#ffffff" stroke-width="1.2"/>
  <text x="330" y="325" fill="#ffffff" font-size="10" text-anchor="middle">nw/2</text>

  <!-- pitch 표시 -->
  <line x1="160" y1="330" x2="320" y2="330" stroke="#cccccc" stroke-width="1.2"/>
  <line x1="160" y1="326" x2="160" y2="334" stroke="#cccccc" stroke-width="1.2"/>
  <line x1="320" y1="326" x2="320" y2="334" stroke="#cccccc" stroke-width="1.2"/>
  <text x="240" y="325" fill="#cccccc" font-size="10" text-anchor="middle">pitch</text>

  <!-- 수식 박스 -->
  <rect x="420" y="85" width="180" height="130" rx="6" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="510" y="105" fill="#aaaaaa" font-size="11" text-anchor="middle">수식</text>
  <text x="435" y="125" fill="#27AE60" font-size="11">x_start =</text>
  <text x="435" y="140" fill="#ffffff" font-size="10">  G_left.cx − nickel_w/2</text>
  <text x="435" y="158" fill="#27AE60" font-size="11">x_end =</text>
  <text x="435" y="173" fill="#ffffff" font-size="10">  G_right.cx + nickel_w/2</text>
  <text x="435" y="195" fill="#27AE60" font-size="11">width = x_end − x_start</text>

  <!-- 설명 박스 -->
  <rect x="420" y="230" width="180" height="115" rx="6" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="510" y="250" fill="#aaaaaa" font-size="11" text-anchor="middle">의미</text>
  <text x="428" y="268" fill="#ffffff" font-size="10">좌 세로 스파인 왼쪽 엣지</text>
  <text x="428" y="283" fill="#ffffff" font-size="10">~ 우 세로 스파인 오른쪽 엣지</text>
  <text x="428" y="303" fill="#E07B26" font-size="10">두 그룹 세로줄의 바깥 엣지를</text>
  <text x="428" y="318" fill="#E07B26" font-size="10">가로 브리지가 꽉 채운다</text>
  <text x="428" y="335" fill="#aaaaaa" font-size="10">(셀 중심 기준, 셀 밖 확장 없음)</text>

  <!-- ㄷ 모양 화살표 표시 -->
  <text x="510" y="180" fill="#888888" font-size="42" text-anchor="middle" opacity="0.25">ㄷ</text>

</svg>
